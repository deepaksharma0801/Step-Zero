services:
  - type: web
    name: step-zero
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "20"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
